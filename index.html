<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Yottagram</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
}

/* LOGIN */

#login{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
gap:10px;
}

input{
padding:10px;
border-radius:8px;
border:none;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#ff2f6d;
color:white;
cursor:pointer;
}

/* FEED */

#feed{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
display:none;
}

.post{
height:100vh;
scroll-snap-align:start;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

.media{
max-width:100%;
max-height:100%;
}

/* RIGHT BAR */

.right{
position:absolute;
right:20px;
bottom:120px;
display:flex;
flex-direction:column;
gap:20px;
font-size:28px;
}

.right button{
background:none;
border:none;
color:white;
font-size:28px;
cursor:pointer;
}

/* BOTTOM */

.bottom{
position:absolute;
bottom:30px;
left:20px;
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:45px;
height:45px;
border-radius:50%;
object-fit:cover;
}

/* TOP BAR */

#top{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
z-index:10;
display:none;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="login">

<h1>Yottagram</h1>

<input id="nick" placeholder="Nick">
<input id="pass" type="password" placeholder="Hasło">

<button onclick="login()">Zaloguj / Stwórz konto</button>

</div>

<!-- TOP -->

<div id="top">

<input type="file" id="upload" accept="video/*,image/*">
<input type="file" id="avatarUpload" accept="image/*">

</div>

<!-- FEED -->

<div id="feed"></div>

<script>

/* DATA */

let users=JSON.parse(localStorage.getItem("y_users"))||{}
let posts=JSON.parse(localStorage.getItem("y_posts"))||{}

let user=null

/* LOGIN */

function login(){

let nick=document.getElementById("nick").value
let pass=document.getElementById("pass").value

if(!users[nick]){

users[nick]={pass:pass,avatar:null}

}

if(users[nick].pass!==pass){

alert("Złe hasło")

return

}

user=nick

document.getElementById("login").style.display="none"
document.getElementById("feed").style.display="block"
document.getElementById("top").style.display="block"

render()

save()

}

/* RENDER */

function render(){

let feed=document.getElementById("feed")

feed.innerHTML=""

Object.values(posts).forEach(p=>{

let post=document.createElement("div")
post.className="post"

let media

if(p.type==="video"){

media=document.createElement("video")
media.src=p.src
media.autoplay=true
media.loop=true
media.muted=true
media.className="media"

}else{

media=document.createElement("img")
media.src=p.src
media.className="media"

}

post.appendChild(media)

/* RIGHT */

let right=document.createElement("div")
right.className="right"

let like=document.createElement("button")

like.innerText="❤️ "+p.likes

like.onclick=()=>{

p.likes++

save()

render()

}

let comment=document.createElement("button")

comment.innerText="💬"

comment.onclick=()=>{

let text=prompt("Komentarz")

if(text){

p.comments.push("["+user+"] "+text)

save()

}

}

let share=document.createElement("button")

share.innerText="↗"

share.onclick=()=>{

navigator.clipboard.writeText(location.href)

alert("Link skopiowany!")

}

right.appendChild(like)
right.appendChild(comment)
right.appendChild(share)

post.appendChild(right)

/* BOTTOM */

let bottom=document.createElement("div")
bottom.className="bottom"

let avatar=document.createElement("img")
avatar.className="avatar"
avatar.src=users[p.user].avatar || "https://i.pravatar.cc/100"

let info=document.createElement("div")

info.innerHTML="<b>@"+p.user+"</b><br>🎵 original sound"

bottom.appendChild(avatar)
bottom.appendChild(info)

post.appendChild(bottom)

feed.appendChild(post)

})

}

/* UPLOAD POST */

document.getElementById("upload").addEventListener("change",function(){

let file=this.files[0]

let reader=new FileReader()

reader.onload=function(){

let type=file.type.startsWith("video")?"video":"image"

posts[Date.now()]={

src:reader.result,
type:type,
likes:0,
comments:[],
user:user

}

save()

render()

}

reader.readAsDataURL(file)

})

/* AVATAR */

document.getElementById("avatarUpload").addEventListener("change",function(){

let file=this.files[0]

let reader=new FileReader()

reader.onload=function(){

users[user].avatar=reader.result

save()

render()

}

reader.readAsDataURL(file)

})

/* SAVE */

function save(){

localStorage.setItem("y_users",JSON.stringify(users))
localStorage.setItem("y_posts",JSON.stringify(posts))

}

</script>

</body>
</html>
