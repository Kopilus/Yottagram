<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Yottagram</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

/* LOGIN */

#login{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
gap:10px;
}

input,textarea{
padding:10px;
border-radius:8px;
border:none;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#ff2f6d;
color:white;
cursor:pointer;
}

/* APP */

#app{
display:none;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#222;
}

header img{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
}

/* FEED */

#feed{
text-align:center;
padding:10px;
}

.postMedia{
width:100%;
height:60vh;
object-fit:contain;
background:black;
border-radius:10px;
}

/* ARROWS */

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:40px;
cursor:pointer;
user-select:none;
}

#leftArrow{
left:10px;
}

#rightArrow{
right:10px;
}

/* PROFILE */

#profile{
position:fixed;
top:0;
right:0;
width:300px;
height:100%;
background:#1b1b1b;
padding:20px;
display:none;
overflow:auto;
}

.avatar{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
}

/* COMMENTS */

.comment{
display:flex;
align-items:center;
gap:8px;
background:#333;
margin:5px;
padding:5px;
border-radius:5px;
}

.comment img{
width:25px;
height:25px;
border-radius:50%;
}

/* MOBILE */

@media (max-width:600px){

#profile{
width:100%;
}

.postMedia{
max-width:100%;
}

}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="login">

<h1>Yottagram</h1>

<input id="nick" placeholder="Nick">
<input id="pass" type="password" placeholder="Hasło">

<button onclick="login()">Zaloguj / Stwórz konto</button>

</div>

<!-- APP -->

<div id="app">

<header>

<h2>Yottagram</h2>

<div>

<button onclick="document.getElementById('upload').click()">Wstaw post</button>
<input type="file" id="upload" accept="image/*,video/*" hidden>

<button onclick="toggleProfile()">Profil</button>

<img id="topAvatar">

</div>

</header>

<div id="feed">

<div id="leftArrow" class="arrow" onclick="prev()">⬅</div>

<div id="mediaContainer"></div>

<div id="rightArrow" class="arrow" onclick="next()">➡</div>

<p onclick="like()">❤️ <span id="likes">0</span></p>

<p id="postDesc"></p>

<div id="comments"></div>

<input id="commentText" placeholder="Komentarz">
<button onclick="addComment()">OK</button>

</div>

</div>

<!-- PROFILE -->

<div id="profile">

<button onclick="toggleProfile()">Zamknij</button>

<h3 id="profileNick"></h3>

<button onclick="document.getElementById('avatarUpload').click()">Ustaw zdjęcie profilowe</button>
<input type="file" id="avatarUpload" accept="image/*" hidden>

<br><br>

<img id="avatar" class="avatar">

<h4>Twoje posty</h4>

<div id="myPosts"></div>

</div>

<script>

let posts=JSON.parse(localStorage.getItem("y_posts"))||[]
let users=JSON.parse(localStorage.getItem("y_users"))||{}

let current=0
let user=null

function login(){

let nick=document.getElementById("nick").value
let pass=document.getElementById("pass").value

if(!users[nick]){
users[nick]={pass:pass,avatar:null,posts:[]}
}

if(users[nick].pass!==pass){
alert("Złe hasło")
return
}

user=nick

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

document.getElementById("profileNick").innerText=nick

loadAvatar()
renderProfile()
loadPost()

}

/* PROFILE */

function toggleProfile(){

let p=document.getElementById("profile")

p.style.display=p.style.display==="none"?"block":"none"

}

/* AVATAR */

document.getElementById("avatarUpload").addEventListener("change",function(){

let file=this.files[0]
let reader=new FileReader()

reader.onload=function(){

users[user].avatar=reader.result

save()
loadAvatar()

}

reader.readAsDataURL(file)

})

function loadAvatar(){

let av=users[user].avatar

if(av){

document.getElementById("avatar").src=av
document.getElementById("topAvatar").src=av

}

}

/* ADD POST */

document.getElementById("upload").addEventListener("change",function(){

let file=this.files[0]

let desc=prompt("Opis posta + hasztagi")

let reader=new FileReader()

reader.onload=function(){

let type=file.type.startsWith("video")?"video":"image"

let post={

src:reader.result,
type:type,
likes:0,
likedBy:[],
desc:desc||"",
comments:[],
author:user

}

posts.push(post)
users[user].posts.push(reader.result)

save()

current=posts.length-1

loadPost()
renderProfile()

}

reader.readAsDataURL(file)

})

/* LOAD POST */

function loadPost(){

if(posts.length===0)return

let p=posts[current]

let container=document.getElementById("mediaContainer")

container.innerHTML=""

let media

if(p.type==="video"){

media=document.createElement("video")
media.src=p.src
media.controls=true

}else{

media=document.createElement("img")
media.src=p.src

}

media.className="postMedia"

container.appendChild(media)

document.getElementById("likes").innerText=p.likes
document.getElementById("postDesc").innerText=p.desc

let cdiv=document.getElementById("comments")
cdiv.innerHTML=""

p.comments.forEach(c=>{

let d=document.createElement("div")
d.className="comment"

let av=document.createElement("img")
av.src=users[c.user]?.avatar||""

let text=document.createElement("span")
text.innerText="["+c.user+"] "+c.text

d.appendChild(av)
d.appendChild(text)

cdiv.appendChild(d)

})

}

/* ARROWS */

function next(){

current++
if(current>=posts.length)current=0

loadPost()

}

function prev(){

current--
if(current<0)current=posts.length-1

loadPost()

}

/* LIKE */

function like(){

let p=posts[current]

if(p.likedBy.includes(user))return

p.likes++
p.likedBy.push(user)

save()
loadPost()

}

/* COMMENT */

function addComment(){

let text=document.getElementById("commentText").value

if(!text)return

posts[current].comments.push({user:user,text:text})

document.getElementById("commentText").value=""

save()
loadPost()

}

/* PROFILE POSTS */

function renderProfile(){

let div=document.getElementById("myPosts")

div.innerHTML=""

users[user].posts.forEach(p=>{

let img=document.createElement("img")

img.src=p
img.style.width="100%"
img.style.marginTop="10px"

div.appendChild(img)

})

}

/* SAVE */

function save(){

localStorage.setItem("y_posts",JSON.stringify(posts))
localStorage.setItem("y_users",JSON.stringify(users))

}

</script>

</body>
</html>
